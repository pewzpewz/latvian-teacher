name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (root)
        run: npm audit --audit-level=critical

      - name: Validate content JSON
        run: npm run validate:content

      - name: Generate content & icons
        run: npm run build:content && npm run icons:generate

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Security audit (server)
        working-directory: server
        run: npm audit --audit-level=high

      - name: Typecheck server
        working-directory: server
        run: npm run typecheck

      - name: Build server
        working-directory: server
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, server]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t latvian-teacher:ci .

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate content & icons
        run: npm run build:content && npm run icons:generate

      - name: E2E tests
        run: npm run test:e2e
