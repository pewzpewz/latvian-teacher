# fly.toml — https://fly.io/docs/reference/configuration/
app = "latvian-teacher"
primary_region = "fra"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
